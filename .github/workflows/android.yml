name: Android Build

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Download FFmpeg AAR from release
      run: |
        mkdir -p module-ffmpeg/libs
        curl -L -o module-ffmpeg/libs/ffmpeg-kit-full.aar "https://github.com/PLEXVOS/MulyTool/releases/download/v1.0/ffmpeg-kit-full.aar"

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
        sudo mkdir -p /usr/local/lib/android/sdk/cmdline-tools
        sudo unzip cmdtools.zip -d /usr/local/lib/android/sdk/cmdline-tools
        sudo mv /usr/local/lib/android/sdk/cmdline-tools/cmdline-tools /usr/local/lib/android/sdk/cmdline-tools/latest
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build Debug APK
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
